summary: Just binary is available and shows version

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # just must be on PATH
  workshop exec -- bash -c 'command -v just'

  # binary must start and report its version
  workshop exec -- just --version

  # version output must look like a semver (N.N.N)
  workshop exec -- just --version | grep -qE 'just [0-9]+\.[0-9]+\.[0-9]+'

debug: |
  workshop tasks
  workshop exec -- bash -c 'just --version || true'
